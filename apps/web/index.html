<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+SC:wght@300;400&family=Parisienne&family=Work+Sans:wght@300;400&display=swap" rel="stylesheet">
    <title>Trace Scope Platform</title>
  </head>
  <body>
    <div id="root">
      <style>
        #root { width: 100vw; height: 100vh; margin: 0; padding: 0; overflow: hidden;
          background: linear-gradient(to bottom,
            rgba(135,206,235,0.85) 0%,
            rgba(255,217,218,0.85) 100%);
          display: flex; align-items: center; justify-content: center;
          font-family: 'Work Sans', sans-serif; color: rgba(60,60,80,0.6); }
        .root-loader { width: 80px; height: 80px; border-radius: 24%;
          background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(200,220,255,0.7));
          box-shadow: 0 0 30px rgba(255,255,255,0.5), 0 0 60px rgba(255,255,255,0.2);
          animation: rootDice 2.5s ease-in-out infinite; }
        @keyframes rootDice {
          0% { transform: rotate(0deg) scale(1); }
          50% { transform: rotate(180deg) scale(0.92); }
          100% { transform: rotate(360deg) scale(1); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
