<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+SC:wght@300;400&family=Parisienne&family=Work+Sans:wght@300;400&display=swap" rel="stylesheet">
    <title>Trace Scope Platform</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      #root {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: fixed;
        top: 0; left: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .sky-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: linear-gradient(to bottom, #87CEEB 0%, #FFD9DA 55%, #f85a4e 100%);
        transition: opacity 1.2s ease;
      }
      .loader-wrap {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }
      .loader-dice {
        width: 96px;
        height: 96px;
        border-radius: 22%;
        background: linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(220,235,255,0.75) 100%);
        box-shadow:
          0 0 24px rgba(255,255,255,0.55),
          0 0 60px rgba(255,255,255,0.22),
          inset 0 2px 8px rgba(255,255,255,0.8),
          inset 0 -2px 8px rgba(180,200,230,0.3);
        animation: diceSpin 2.4s ease-in-out infinite;
        filter: drop-shadow(0 4px 16px rgba(0,0,0,0.06));
      }
      .loader-text {
        font-family: 'Cormorant Garamond', 'Georgia', serif;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(60,40,50,0.45);
        font-style: italic;
      }
      .loader-bar {
        width: 120px;
        height: 2px;
        border-radius: 2px;
        background: rgba(255,255,255,0.35);
        overflow: hidden;
        position: relative;
      }
      .loader-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
        animation: barSweep 1.8s ease-in-out infinite;
      }
      @keyframes diceSpin {
        0% { transform: rotate(0deg) scale(1); }
        45% { transform: rotate(190deg) scale(0.91); }
        55% { transform: rotate(200deg) scale(0.91); }
        100% { transform: rotate(380deg) scale(1); }
      }
      @keyframes barSweep {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="sky-bg"></div>
      <div class="loader-wrap">
        <div class="loader-dice"></div>
        <div class="loader-bar"></div>
        <div class="loader-text">Loading</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
