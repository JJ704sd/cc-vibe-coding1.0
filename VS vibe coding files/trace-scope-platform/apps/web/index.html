<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+SC:wght@300;400&family=Parisienne&family=Work+Sans:wght@300;400&display=swap" rel="stylesheet">
    <title>Trace Scope Platform</title>
    <style>
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
      }
      body {
        background: linear-gradient(to bottom, #87CEEB 0%, #FFD9DA 55%, #f85a4e 100%);
      }
      #root {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: fixed;
        top: 0; left: 0;
        /* Ensure sky gradient is always painted under #root content */
        background: linear-gradient(to bottom, #87CEEB 0%, #FFD9DA 55%, #f85a4e 100%);
      }

      /* ── Pre-load splash (sibling to #root — never erased by React) ── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        transition: opacity 1.2s ease;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }

      /* Sky behind clock (same gradient as body) */
      .sky-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: linear-gradient(to bottom, #87CEEB 0%, #FFD9DA 55%, #f85a4e 100%);
      }

      /* Clock face */
      .clock {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: radial-gradient(circle at 38% 38%,
          rgba(255,255,255,0.96) 0%,
          rgba(240,248,255,0.85) 40%,
          rgba(210,225,245,0.7) 100%);
        box-shadow:
          0 0 0 1.5px rgba(255,255,255,0.6),
          0 0 0 3px rgba(180,200,230,0.25),
          0 8px 32px rgba(120,80,60,0.12),
          0 2px 8px rgba(100,60,40,0.08),
          inset 0 1.5px 4px rgba(255,255,255,0.9),
          inset 0 -1.5px 4px rgba(150,180,210,0.3);
        position: relative;
        animation: clockFadeIn 0.8s ease both;
      }
      .clock::before {
        content: '';
        position: absolute;
        inset: 5px;
        border-radius: 50%;
        border: 1px solid rgba(160,180,210,0.3);
      }

      /* Hour markers */
      .mark {
        position: absolute;
        background: rgba(120,100,140,0.25);
        border-radius: 1px;
      }
      .mark-h { width: 1.5px; height: 5px; top: 7px; left: 50%; transform-origin: 50% 39px; }
      .mark-v { width: 5px; height: 1.5px; top: 50%; transform-origin: 2px 50%; }
      .mark-12 { transform: translateX(-50%) rotate(0deg); background: rgba(120,100,140,0.5); }
      .mark-1  { transform: translateX(-50%) rotate(30deg); }
      .mark-2  { transform: translateX(-50%) rotate(60deg); }
      .mark-3  { transform: translateY(-50%) rotate(0deg) translateX(2px); right: 7px; left: auto; width: 5px; height: 1.5px; background: rgba(120,100,140,0.5); }
      .mark-4  { transform: translateX(50%) rotate(30deg) translateX(-2px); top: 50%; background: rgba(120,100,140,0.25); }
      .mark-5  { transform: translateX(50%) rotate(60deg) translateX(-2px); top: 50%; background: rgba(120,100,140,0.25); }
      .mark-6  { transform: translateY(-50%) rotate(0deg); bottom: 7px; top: auto; width: 1.5px; height: 5px; background: rgba(120,100,140,0.5); }
      .mark-7  { transform: translateX(-50%) rotate(-60deg); }
      .mark-8  { transform: translateX(-50%) rotate(-30deg); }
      .mark-9  { left: 7px; transform: translateY(-50%) rotate(0deg) translateX(-2px); width: 5px; height: 1.5px; background: rgba(120,100,140,0.5); }
      .mark-10 { transform: translateX(-50%) rotate(120deg); }
      .mark-11 { transform: translateX(-50%) rotate(150deg); }

      /* Clock hands */
      .hand {
        position: absolute;
        bottom: 50%;
        left: 50%;
        transform-origin: 50% 100%;
        border-radius: 2px;
      }
      .hour-hand {
        width: 2.5px;
        height: 24px;
        margin-left: -1.25px;
        background: linear-gradient(to top, rgba(100,80,120,0.75), rgba(140,110,160,0.55));
        border-radius: 2px;
        z-index: 3;
      }
      .minute-hand {
        width: 1.5px;
        height: 33px;
        margin-left: -0.75px;
        background: linear-gradient(to top, rgba(100,80,120,0.65), rgba(140,110,160,0.45));
        border-radius: 1.5px;
        z-index: 4;
      }
      .second-hand {
        width: 1px;
        height: 37px;
        margin-left: -0.5px;
        background: linear-gradient(to top, rgba(248,90,78,0.8), rgba(248,90,78,0.3));
        border-radius: 1px;
        z-index: 5;
      }
      .center-cap {
        position: absolute;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, #f85a4e 0%, rgba(248,90,78,0.6) 100%);
        box-shadow: 0 0 5px rgba(248,90,78,0.4);
        z-index: 6;
      }

      .loader-text {
        font-family: 'Cormorant Garamond', 'Georgia', serif;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(60,40,50,0.45);
        font-style: italic;
        animation: clockFadeIn 0.8s 0.25s ease both;
      }
      .loader-bar {
        width: 120px;
        height: 2px;
        border-radius: 2px;
        background: rgba(255,255,255,0.3);
        overflow: hidden;
        position: relative;
        animation: clockFadeIn 0.8s 0.45s ease both;
      }
      .loader-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
        animation: barSweep 1.8s ease-in-out infinite;
      }

      @keyframes clockFadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes barSweep {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
    </style>
  </head>
  <body>
    <!-- Pre-load splash — sibling to #root, never touched by React -->
    <div id="splash">
      <div class="sky-bg"></div>
      <div class="clock">
        <div class="mark mark-h mark-12"></div>
        <div class="mark mark-h mark-1"></div>
        <div class="mark mark-h mark-2"></div>
        <div class="mark mark-v mark-3"></div>
        <div class="mark mark-h mark-4"></div>
        <div class="mark mark-h mark-5"></div>
        <div class="mark mark-h mark-6"></div>
        <div class="mark mark-h mark-7"></div>
        <div class="mark mark-h mark-8"></div>
        <div class="mark mark-v mark-9"></div>
        <div class="mark mark-h mark-10"></div>
        <div class="mark mark-h mark-11"></div>
        <div class="hand hour-hand" id="hourHand"></div>
        <div class="hand minute-hand" id="minuteHand"></div>
        <div class="hand second-hand" id="secondHand"></div>
        <div class="center-cap"></div>
      </div>
      <div class="loader-text">Trace Scope</div>
      <div class="loader-bar"></div>
    </div>

    <div id="root"></div>

    <script>
      /* ── Real-time clock hands ── */
      function updateClock() {
        var now = new Date();
        var h = now.getHours() % 12;
        var m = now.getMinutes();
        var s = now.getSeconds();
        var ms = now.getMilliseconds();

        var sh = document.getElementById('secondHand');
        var mh = document.getElementById('minuteHand');
        var hh = document.getElementById('hourHand');
        if (sh) sh.style.transform = 'rotate(' + ((s + ms / 1000) * 6) + 'deg)';
        if (mh) mh.style.transform = 'rotate(' + ((m + s / 60) * 6) + 'deg)';
        if (hh) hh.style.transform = 'rotate(' + ((h + m / 60) * 30) + 'deg)';

        requestAnimationFrame(updateClock);
      }
      updateClock();

      /* ── Fade-out splash when React mounts into #root ── */
      var splashObs = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          splashObs.disconnect();
          /* Wait a beat for LoadingScreen's own mount animation, then fade */
          setTimeout(function() {
            var sp = document.getElementById('splash');
            if (sp) {
              sp.classList.add('fade-out');
              setTimeout(function() {
                var el = document.getElementById('splash');
                if (el) el.remove();
              }, 1250);
            }
          }, 400);
        }
      });
      splashObs.observe(document.getElementById('root'), { childList: true });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
